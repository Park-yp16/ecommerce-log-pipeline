name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java (PySpark 의존성)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas pyarrow pyspark==3.5.1 pytest

      - name: Run tests (log_generator + transform)
        run: pytest tests/test_log_generator.py tests/test_transform.py -v
